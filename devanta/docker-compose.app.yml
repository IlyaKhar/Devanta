services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devanta-backend-app
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-devanta}:${POSTGRES_PASSWORD:-devanta}@postgres:5432/${POSTGRES_DB:-devanta}?sslmode=disable
    networks:
      - devanta-db-net

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: devanta-web-app
    depends_on:
      - backend
    networks:
      - devanta-db-net

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: devanta-bot-app
    env_file:
      - .env
    environment:
      BACKEND_PUBLIC_URL: http://backend:8080
    depends_on:
      - backend
    networks:
      - devanta-db-net

  nginx:
    image: nginx:1.27-alpine
    container_name: devanta-nginx-app
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - backend
    networks:
      - devanta-db-net

networks:
  devanta-db-net:
    external: true
