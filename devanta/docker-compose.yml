services:
  postgres:
    image: postgres:16-alpine
    container_name: devanta-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devanta-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devanta-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - devanta-net

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: devanta-web
    depends_on:
      - backend
    networks:
      - devanta-net

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: devanta-bot
    env_file:
      - .env
    environment:
      BACKEND_PUBLIC_URL: http://backend:8080
    depends_on:
      - backend
    networks:
      - devanta-net

  nginx:
    image: nginx:1.27-alpine
    container_name: devanta-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - backend
    networks:
      - devanta-net

volumes:
  postgres_data:

networks:
  devanta-net:
