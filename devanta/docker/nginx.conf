events {}

http {
  upstream web_upstream {
    server web:80;
  }

  upstream backend_upstream {
    server backend:8080;
  }

  upstream support_bot_upstream {
    server support-bot:8090;
  }

  server {
    listen 80;
    server_name _;

    # Загрузка аватара до 2MB + запас; дефолт nginx 1m режет multipart.
    client_max_body_size 8m;

    location /api/ {
      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
      proxy_pass http://backend_upstream/health;
    }

    # Аватары: ^~ чтобы не перехватывалось location / ; префикс /uploads без обязательного слеша после uploads.
    location ^~ /uploads {
      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger: только /swagger/ матчится — без слеша запрос уезжал во фронт и давал 404.
    location = /swagger {
      return 301 /swagger/;
    }
    location /swagger/ {
      # Без URI в proxy_pass — на бэк уходит тот же путь /swagger/...
      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /openapi.yaml {
      proxy_pass http://backend_upstream/openapi.yaml;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Telegram webhook (support-bot)
    location /telegram/webhook {
      proxy_pass http://support_bot_upstream/telegram/webhook;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Support-bot health (опционально)
    location /support-bot/health {
      proxy_pass http://support_bot_upstream/health;
    }

    location / {
      proxy_pass http://web_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}